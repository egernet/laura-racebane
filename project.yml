name: Racebane
options:
  bundleIdPrefix: dk.laura
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: da
  xcodeVersion: "15.0"

targets:
  Racebane:
    type: application
    platform: iOS
    sources:
      - path: Racebane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.egernet.laura.Racebane
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: Racebane
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Racebane bruger lokalt netværk til multiplayer
        INFOPLIST_KEY_NSBonjourServices: "_racebane._tcp"
        INFOPLIST_KEY_NSCameraUsageDescription: Racebane bruger kameraet til AR-mode

  RacebaneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RacebaneTests
    dependencies:
      - target: Racebane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.laura.RacebaneTests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
